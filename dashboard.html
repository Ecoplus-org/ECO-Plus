<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ECO Plus Admin Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<div class="logo">
Eco Plus
</div>

<ul>
<li><a href="index.html">Home</a></li>
</ul>
</nav>

<div class="dashboard-header">

<h1>Admin Dashboard</h1>

<p>Smart Garbage & Littering Management System</p>

</div>

<section class="stats">

<div class="card">
<h2 id="totalComplaints">0</h2>
<p>Total Reports</p>
</div>

<div class="card">
<h2 id="pendingComplaints">0</h2>
<p>Pending Reports</p>
</div>

<div class="card">
<h2 id="resolvedComplaints">0</h2>
<p>Resolved Reports</p>
</div>

</section>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Search by Name, ID, Phone, District"
onkeyup="searchComplaint()">

<div class="admin-menu">

<button onclick="showComplaintsTable()">📋 All Reports</button>

<button onclick="filterComplaints('Municipality')">🏛 Municipality</button>

<button onclick="filterComplaints('School')">🏫 School</button>

<button onclick="filterComplaints('College')">🎓 College</button>

<button onclick="filterComplaints('Railway')">🚆 Railway</button>

<button onclick="filterComplaints('Hospital')">🏥 Hospital</button>

<button onclick="window.print()">🖨 Print Report</button>

<button onclick="downloadCSV()">📥 Download CSV</button>

<button class="danger-btn" onclick="deleteAllComplaints()">
🗑 Delete All Reports
</button>

</div>

<div id="complaintList"></div>

<script src="script.js"></script>

<script>
loadStatistics();
showComplaintsTable();
</script>

</body>
</html>
